services:
  - type: web
    name: meshlix-xmtp-backend
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: XMTP_ENV
        value: production
      - key: SESSION_TTL_MS
        value: 1800000
      - key: XMTP_POLL_INTERVAL_MS
        value: 5000
